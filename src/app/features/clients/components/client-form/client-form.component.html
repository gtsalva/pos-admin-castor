<div style="padding: 24px; max-width: 800px;">
  <h2>{{ isEdit() ? 'Editar cliente' : 'Nuevo cliente' }}</h2>
  <nz-card>
    <form nz-form [formGroup]="form" nzLayout="vertical" (ngSubmit)="submit()">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Nombre completo</nz-form-label>
            <nz-form-control nzErrorTip="Nombre es requerido">
              <input nz-input formControlName="full_name" placeholder="Juan Pérez" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>Razón social</nz-form-label>
            <nz-form-control>
              <input nz-input formControlName="business_name" placeholder="Mi Empresa S.A." />
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label>NIT</nz-form-label>
            <nz-form-control><input nz-input formControlName="nit" placeholder="1234567-8" /></nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label>DPI</nz-form-label>
            <nz-form-control><input nz-input formControlName="dpi" placeholder="1234567890101" /></nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="8">
          <nz-form-item>
            <nz-form-label>Teléfono</nz-form-label>
            <nz-form-control><input nz-input formControlName="phone" placeholder="+502 5555-1234" /></nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <nz-form-item>
        <nz-form-label>Correo electrónico</nz-form-label>
        <nz-form-control nzErrorTip="Correo inválido">
          <input nz-input formControlName="email" placeholder="cliente@example.com" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label>Dirección de facturación</nz-form-label>
        <nz-form-control><input nz-input formControlName="billing_address" placeholder="6a Av. 5-10 Zona 1" /></nz-form-control>
      </nz-form-item>
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>Departamento</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="billing_department" nzShowSearch nzPlaceHolder="Seleccionar departamento">
                @for (d of departamentos; track d.name) {
                  <nz-option [nzValue]="d.name" [nzLabel]="d.name" />
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label>Municipio</nz-form-label>
            <nz-form-control>
              <nz-select formControlName="billing_city" nzShowSearch nzPlaceHolder="Seleccionar municipio">
                @for (m of currentMunicipios(); track m) {
                  <nz-option [nzValue]="m" [nzLabel]="m" />
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
        <button nz-button type="button" (click)="cancel()">Cancelar</button>
        <button nz-button nzType="primary" type="submit" [nzLoading]="loading()">{{ isEdit() ? 'Guardar cambios' : 'Crear cliente' }}</button>
      </div>
    </form>
  </nz-card>
</div>
