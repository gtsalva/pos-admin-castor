<nz-layout class="shell-layout">
  <nz-sider [nzWidth]="240" class="shell-sider">
    <div class="shell-brand">
      <div class="brand-icon"><span>C</span></div>
      <span class="brand-name">{{ store_name() }}</span>
    </div>
    <app-sidebar [navGroups]="navGroups" />
  </nz-sider>

  <nz-layout>
    <nz-header class="shell-header">
      <div class="header-spacer"></div>
      <div class="header-user" nz-dropdown [nzDropdownMenu]="userMenu" nzPlacement="bottomRight">
        @if (currentUser()?.photo_url) {
          <nz-avatar [nzSrc]="currentUser()!.photo_url!" nzSize="small" />
        } @else {
          <nz-avatar [nzText]="avatarInitials()" nzSize="small"
            style="background:#C85A1A;color:#fff;font-weight:600" />
        }
        <span class="header-username">{{ currentUser()?.full_name }}</span>
        <span nz-icon nzType="down"></span>
      </div>
      <nz-dropdown-menu #userMenu="nzDropdownMenu">
        <ul nz-menu>
          <li nz-menu-item disabled>{{ currentUser()?.email }}</li>
          <li nz-menu-divider></li>
          <li nz-menu-item (click)="goToPerfil()">
            <span nz-icon nzType="key"></span>
            Cambiar contraseña
          </li>
          <li nz-menu-divider></li>
          <li nz-menu-item (click)="logout()">
            <span nz-icon nzType="logout"></span>
            Cerrar sesión
          </li>
        </ul>
      </nz-dropdown-menu>
    </nz-header>

    <nz-content class="shell-content">
      <router-outlet />
    </nz-content>
  </nz-layout>
</nz-layout>
